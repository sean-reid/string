name: ci

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.33.0
  NODE_VERSION: "22"
  RUST_VERSION: "1.83"

jobs:
  solver:
    name: solver (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solver
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/solver/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/solver/Cargo.toml -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/solver/Cargo.toml

  web:
    name: web (lint / types / unit / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solver
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: solver build
        run: pnpm solver:build
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: unit tests
        run: pnpm test
      - name: build
        run: pnpm build
      - name: upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  e2e:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: web
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome, mobile-safari]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: resolve browser
        id: browser
        run: |
          case "${{ matrix.project }}" in
            mobile-safari) echo "id=webkit" >> "$GITHUB_OUTPUT" ;;
            *) echo "id=chromium" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: cache playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ steps.browser.outputs.id }}
      - name: install playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm --filter web exec playwright install-deps ${{ steps.browser.outputs.id }}
          else
            pnpm --filter web exec playwright install --with-deps ${{ steps.browser.outputs.id }}
          fi
      - name: download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: run playwright
        run: pnpm --filter web exec playwright test --project=${{ matrix.project }}
      - name: upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/web/playwright-report
          retention-days: 7

  audit:
    name: security (pnpm / cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level high
      - name: cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: deploy (cloudflare pages)
    runs-on: ubuntu-latest
    needs: [web, e2e]
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: download build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: resolve deploy branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - name: publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy apps/web/dist --project-name=string-loom --branch="${{ steps.branch.outputs.name }}"
