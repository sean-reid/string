name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.33.0
  NODE_VERSION: "22"
  RUST_VERSION: "1.83"

jobs:
  solver:
    name: solver (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solver
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/solver/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/solver/Cargo.toml -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/solver/Cargo.toml

  web:
    name: web (lint / types / unit / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solver
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: solver build
        run: pnpm solver:build
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: unit tests
        run: pnpm test
      - name: build
        run: pnpm build
      - name: upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solver
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: solver build
        run: pnpm solver:build
      - name: build web
        run: pnpm --filter web build
      - name: install playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium webkit
      - name: run playwright
        run: pnpm e2e
      - name: upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  audit:
    name: security (pnpm / cargo audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level high
      - name: cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
